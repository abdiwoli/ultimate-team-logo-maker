<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Ultimate Team Logo Maker - Free Online Profile Image Generator</title>
    <meta name="description"
        content="Create professional team logos and profile images for free. The ultimate online logo generator for sports teams, gaming clans, and social media profiles.">
    <meta name="keywords"
        content="logo, logo generator, online logo, logo create, profile image, team logo maker, free logo maker, gaming logo, clan logo, sports logo">
    <meta name="author" content="Ultimate Team Logo Maker">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ultimate-team-logo-maker.vercel.app/">
    <meta property="og:title" content="Ultimate Team Logo Maker - Free Online Profile Image Generator">
    <meta property="og:description"
        content="Create professional team logos and profile images for free. The ultimate online logo generator for sports teams, gaming clans, and social media profiles.">
    <meta property="og:image" content="https://ultimate-team-logo-maker.vercel.app/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ultimate-team-logo-maker.vercel.app/">
    <meta property="twitter:title" content="Ultimate Team Logo Maker - Free Online Profile Image Generator">
    <meta property="twitter:description"
        content="Create professional team logos and profile images for free. The ultimate online logo generator for sports teams, gaming clans, and social media profiles.">
    <meta property="twitter:image" content="https://ultimate-team-logo-maker.vercel.app/og-image.jpg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;700&family=Roboto+Condensed:wght@700&family=Montserrat:wght@700&family=Poppins:wght@700&family=Open+Sans:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <div class="container">
            <h1>Ultimate Logo Maker</h1>

            <div class="main-layout">
                <div class="controls-area">

                    <div class="control-group">
                        <h3>1. Canvas & Background</h3>
                        <div class="row">
                            <div class="col">
                                <label>Logo Shape</label>
                                <select id="shapeInput"
                                    style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                                    <option value="Circle">Circle</option>
                                    <option value="Shield">Shield</option>
                                    <option value="Badge">Badge</option>
                                </select>
                            </div>
                            <div class="col">
                                <label>Background Texture</label>
                                <input type="file" id="bgImageInput" accept="image/*">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col">
                                <label>Outer Size</label>
                                <input type="range" id="outerSizeInput" min="200" max="400" value="380">
                            </div>
                            <div class="col">
                                <label>Inner Size</label>
                                <input type="range" id="innerSizeInput" min="100" max="390" value="240">
                            </div>
                        </div>

                        <div class="row" style="margin-bottom: 10px;">
                            <div class="col">
                                <label>Outer Ring Color</label>
                                <div style="display:flex; gap:5px;">
                                    <input type="color" id="ringColorInput" value="#D4AF37" style="height:35px; width:40px; padding:0; cursor:pointer;">
                                    <div style="flex-grow:1;">
                                        <label style="font-size:10px; display:block;">Opacity</label>
                                        <input type="range" id="ringOpacityInput" min="0" max="100" value="100" style="width:100%;">
                                    </div>
                                </div>
                            </div>
                            <div class="col">
                                <label>Inner Bg Color</label>
                                <div style="display:flex; gap:5px;">
                                    <input type="color" id="centerBgInput" value="#ffffff" style="height:35px; width:40px; padding:0; cursor:pointer;">
                                    <div style="flex-grow:1;">
                                        <label style="font-size:10px; display:block;">Opacity</label>
                                        <input type="range" id="centerBgOpacityInput" min="0" max="100" value="100" style="width:100%;">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col">
                                <label>Base Canvas</label>
                                <input type="color" id="baseColorInput" value="#ffffff" style="width:100%;">
                            </div>
                            <div class="col">
                                <label>Inner Border</label>
                                <input type="color" id="innerBorderColorInput" value="#2b369b" style="width:100%;">
                            </div>
                        </div>

                        <label>Stripes Color</label>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="color" id="stripeColorInput" value="#2b369b">
                            <label style="font-size: 0.8em; margin: 0;"><input type="checkbox" id="showStripesCheck"
                                    checked> Show Stripes</label>
                        </div>
                    </div>

                    <div class="control-group">
                        <h3>2. Layers (Text & Images)</h3>
                        <div class="row" style="margin-bottom: 5px;">
                            <div class="col" style="padding-right: 2px;">
                                <button id="addStraitTextBtn"
                                    style="width:100%; padding:8px 4px; background:#2b369b; color:white; font-size:12px; border:none; border-radius:4px; cursor:pointer;">+ Add Straight Text</button>
                            </div>
                            <div class="col" style="padding-left: 2px;">
                                <button id="addCurveTextBtn"
                                    style="width:100%; padding:8px 4px; background:#d4af37; color:#333; font-weight:bold; font-size:12px; border:none; border-radius:4px; cursor:pointer;">+ Add Curved Text</button>
                            </div>
                        </div>
                        <div class="row" style="margin-bottom: 10px;">
                            <div class="col" style="padding-right: 0px;">
                                <label
                                    style="display:block; width:100%; padding:8px; background:#2b369b; color:white; text-align:center; border:none; border-radius:4px; font-size:13px; cursor:pointer; box-sizing: border-box;">
                                    + Upload & Add Image
                                    <input type="file" id="addImageBtn" accept="image/*" style="display:none;">
                                </label>
                            </div>
                        </div>

                        <select id="layersList" size="6"
                            style="width: 100%; padding: 4px; border: 1px solid #ccc; font-size:14px; background:#f9f9f9; outline:none; cursor:pointer; overflow-y:auto;"></select>
                        <button id="deleteLayerBtn"
                            style="width:100%; padding:8px; margin-top:5px; background: #d32f2f; color: white; border:none; border-radius:4px; cursor:pointer;">Delete
                            Selected Layer</button>
                    </div>

                    <div class="control-group" id="propsPanel" style="display:none; background:#f0f4f8; border: 2px solid #2b369b;">
                        <h3>3. Selected Properties</h3>
                        <p style="font-size:12px; color:#555; margin-bottom:10px;">Drag item on canvas to move.</p>

                        <!-- TEXT PROPS -->
                        <div id="textProps" style="display:none;">
                            <label>Text Content</label>
                            <input type="text" id="elTextInput"
                                style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; margin-bottom:10px;">

                            <div class="row">
                                <div class="col">
                                    <label>Text Color</label>
                                    <input type="color" id="elColorInput" style="width:100%; height:30px; border:none; padding:0; cursor:pointer;">
                                </div>
                                <div class="col">
                                    <label>Stroke Color</label>
                                    <input type="color" id="elStrokeColorInput" style="width:100%; height:30px; border:none; padding:0; cursor:pointer;">
                                </div>
                            </div>

                            <label>Font Size</label>
                            <input type="range" id="elSizeInput" min="10" max="300" value="80">

                            <label>Stroke Width</label>
                            <input type="range" id="elStrokeWidthInput" min="0" max="20" value="0">

                            <label>Font Family</label>
                            <select id="elFontInput"
                                style="width:100%; padding:8px; border-radius:4px; border:1px solid #ccc; margin-bottom:10px;">
                                <option value="Arial">Arial (Default)</option>
                                <option value="'Oswald', sans-serif">Oswald</option>
                                <option value="'Roboto Condensed', sans-serif">Roboto Condensed</option>
                                <option value="'Montserrat', sans-serif">Montserrat</option>
                                <option value="'Poppins', sans-serif">Poppins</option>
                                <option value="'Open Sans', sans-serif">Open Sans</option>
                                <option value="'Inter', sans-serif">Inter</option>
                                <option value="'Segoe UI', sans-serif">Segoe UI</option>
                                <option value="Times New Roman">Times New Roman</option>
                            </select>

                            <label style="margin-bottom:10px; display:block; font-weight:bold;"><input type="checkbox"
                                    id="elCurvedCheck"> Curve Text Layer</label>
                            <div id="curveProps" style="display:none; padding-left:10px; border-left:3px solid #2b369b;">
                                <label>Curve Radius</label>
                                <input type="range" id="elRadiusInput" min="50" max="400" value="310">
                                <label>Letter Spacing</label>
                                <input type="range" id="elSpacingInput" min="-10" max="50" value="12">
                                <label>Curve Rotation</label>
                                <input type="range" id="elAngleInput" min="-180" max="180" value="0">
                                <label style="margin-top:10px; display:block;"><input type="checkbox" id="elIsTopCheck">
                                    Bend Text UPWAY (Top)</label>
                            </div>
                        </div>

                        <!-- IMAGE PROPS -->
                        <div id="imageProps" style="display:none;">
                            <label>Image Size (Zoom %)</label>
                            <input type="range" id="elScaleInput" min="10" max="300" value="100">
                            
                            <label style="margin-top:15px; display:block; font-weight:bold;"><input type="checkbox"
                                    id="elRemoveBgCheck"> Remove Background Color</label>
                            <div style="padding-left:10px; border-left:3px solid #ccc;">
                                <label>Color to Remove</label>
                                <input type="color" id="elRemoveBgColorInput" value="#ffffff" style="width:100%; height:30px; border:none; padding:0; cursor:pointer; margin-bottom: 5px;">
                                <label>Tolerance (Strength)</label>
                                <input type="range" id="elToleranceInput" min="1" max="200" value="50">
                            </div>
                        </div>

                        <!-- SHARED PROPS -->
                        <hr style="margin-top:15px; border:none; border-top:1px solid #ccc;">
                        <div class="row" style="margin-top: 10px;">
                            <div class="col">
                                <label>X Pos (Offset)</label>
                                <input type="number" id="elXInput" style="width:100%; padding:5px;">
                            </div>
                            <div class="col">
                                <label>Y Pos (Offset)</label>
                                <input type="number" id="elYInput" style="width:100%; padding:5px;">
                            </div>
                        </div>
                        
                        <div style="margin-top:10px; text-align:center;">
                            <button id="layerUpBtn" style="padding:5px 10px; cursor:pointer;">Move Layer Up ⬆️</button>
                            <button id="layerDownBtn" style="padding:5px 10px; cursor:pointer;">Move Layer Down ⬇️</button>
                        </div>
                    </div>

                </div>

                <div class="preview-area">
                    <p style="text-align:center; font-size:14px; margin-bottom:10px; color:#555; background:#fff3cd; padding:10px; border-radius:4px; font-weight:bold;">
                        🖱️ Click and drag on the canvas to move elements directly!
                    </p>
                    <canvas id="canvas" width="800" height="800"></canvas>
                    <button id="downloadBtn">Download Image</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
